<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-labelledby="title desc">
  <title id="title">Abstract civil engineering hero visual</title>
  <desc id="desc">Blueprint grid, bridge truss, structural frame, and civil engineering measurement lines.</desc>
